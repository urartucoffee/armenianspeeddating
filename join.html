<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armenian Speed Dating | Sign Up</title>
    
    <meta http-equiv="refresh" content="1; url=https://docs.google.com/forms/d/e/1FAIpQLSeL9h5CFjCjuBeqEYr7x9kymadiiaz829jcyR8J8ybR0/viewform">

    <style>
        body {
            background-color: #FDFD47;
            color: #D32F2F;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .loader {
            border: 4px solid rgba(211, 47, 47, 0.1);
            border-left: 4px solid #D32F2F;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn {
            background-color: #D32F2F;
            color: #FDFD47;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 20px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h1>Redirecting to Sign Up...</h1>
    <p>If the form does not open automatically, click the button below:</p>
    
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSeL9h5CFjCjuBeqEYr7x9kymadiiaz829jcyR8J8ybR0/viewform" class="btn">Open Registration Form</a>

</body>
</html>
