<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armenian Speed Dating | Home</title>
    <style>
        /* Shared Styles: Global */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh; /* Fills screen height */
            background-color: #FDFD47; /* Bright Yellow from the sign */
            color: #D32F2F; /* Deep Red/Pink from the sign */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            box-sizing: border-box;
        }

        /* Shared Styles: Navigation Bar */
        nav {
            background-color: #FDFD47;
            padding: 20px 0;
            text-align: center;
            border-bottom: 2px solid rgba(211, 47, 47, 0.2);
        }

        nav a {
            text-decoration: none;
            color: #D32F2F;
            font-weight: bold;
            margin: 0 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1rem;
        }

        /* Shared Styles: Active Page Link */
        nav a.active {
            color: #C71585; /* Different color for the page we are on */
            border-bottom: 2px solid #C71585;

        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        /* Hero Image - Centered and Responsive */
        .hero-img {
            max-width: 90%;
            height: auto;
            display: block;
            border-radius: 10px; /* Optional subtle corner smoothing */
        }

</head>

    <nav>
        <a href="index.html" class="active">Home</a>
